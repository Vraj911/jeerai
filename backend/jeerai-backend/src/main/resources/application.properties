spring.application.name=jeerai-backend
server.port=3000

# Optional local "env file" (properties format). Put it in the backend folder as:
# backend/jeerai-backend/.env.properties
spring.config.import=optional:file:./.env.properties

# Start with the JDBC-backed repository adapters unless explicitly overridden.
spring.profiles.default=postgres

# --- PostgreSQL / JPA
# Configure these via backend/jeerai-backend/.env.properties (imported above) or environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jeerai}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-123456}
app.security.jwt.expiration=86400000

# --- Invitations / Mail
app.invitation.base-url=${INVITATION_BASE_URL:https://jeerai.netlify.app/invite/}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@jeerai.local}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
