spring.application.name=jeerai-backend
server.port=5000

# Optional local "env file" (properties format). Put it in the backend folder as:
# backend/jeerai-backend/.env.properties
spring.config.import=optional:file:./.env.properties

# Default to mock (in-memory) unless explicitly overridden (e.g. SPRING_PROFILES_ACTIVE=postgres)
spring.profiles.default=mock

# --- PostgreSQL / JPA (enabled when DataSource auto-config is active, e.g. profile "postgres")
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
