# Test-only configuration: use in-memory H2 and run Flyway migrations against it.
# This keeps integration tests working without requiring a local Postgres instance.

spring.profiles.active=postgres

spring.datasource.url=jdbc:h2:mem:jeerai_test;MODE=PostgreSQL;NON_KEYWORDS=KEY,VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true

app.security.jwt.secret=test-secret-that-is-at-least-32-bytes-long
app.security.jwt.expiration=86400000
